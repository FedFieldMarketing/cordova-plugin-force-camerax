// This file is injected by Cordova into the app's build.gradle
// Forces CameraX and LiteRT (TensorFlow Lite) to 16KB page-aligned versions for Android compatibility

def forcedCameraXVersion = '1.4.2'
// LiteRT is Google's rebranded TensorFlow Lite. Genius Scan 5.8.0 pulls in litert:1.0.1, whose
// libtensorflowlite_jni.so has 4KB LOAD alignment on armeabi-v7a/x86/x86_64. Version 1.4.2
// ships all four ABIs with 16KB-aligned LOAD segments.
def forcedLiteRTVersion = '1.4.2'

println "[ForceLibVersions] Forcing CameraX to ${forcedCameraXVersion}, LiteRT to ${forcedLiteRTVersion}"

// Apply resolution strategy during configuration phase (before dependency resolution)
configurations.all { cfg ->
    resolutionStrategy.force(
        "androidx.camera:camera-core:${forcedCameraXVersion}",
        "androidx.camera:camera-camera2:${forcedCameraXVersion}",
        "androidx.camera:camera-lifecycle:${forcedCameraXVersion}",
        "com.google.ai.edge.litert:litert:${forcedLiteRTVersion}",
        "com.google.ai.edge.litert:litert-api:${forcedLiteRTVersion}"
    )
}
